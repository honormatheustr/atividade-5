<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Mini Twitter</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="styles/styles.css">

    <style>
        .logo {
            display: block;
            margin: 20px auto;
            width: 180px;
            max-width: 100%;
        }

        h1 {
            text-align: center;
        }
    </style>
</head>

<body>

<main class="container">

    <img
        src="https://img.freepik.com/premium-vector/people-conversation-like-small-talk-concept-give-advice-friend-employee-conversation-lovers-flat-linear-modern-lineart-logotype-graphic-art-design-isolated-white-background_775815-847.jpg?w=740"
        alt="Logo Conversa.Com"
        class="logo">

    <h1>Conversa.Com</h1>

    <form action="feed.html" method="get">

        <label for="email">E-mail</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="Digite seu e-mail"
            required>

        <label for="senha">Senha</label>
        <input
            type="password"
            id="senha"
            name="senha"
            placeholder="Digite sua senha"
            required>

        <button type="submit">
            Entrar
        </button>

    </form>

    <p>
        <a href="cadastro.html">Criar novo usuário</a>
    </p>

    <p>
        <a href="#">Esqueceu sua senha?</a>
    </p>

</main>

</body>
</html>
